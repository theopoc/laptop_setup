---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  vars:
    ansible_user: root
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('') }}"
    mise_tools:
      node: "lts"
      python: "3.11"
  tasks:
    - name: Include mise role
      ansible.builtin.include_role:
        name: mise
