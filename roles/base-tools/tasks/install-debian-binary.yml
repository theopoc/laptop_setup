---
# Install an application from a binary tarball (called per-app via include_tasks)
# Expected variable: app (a dict2items element with app.key and app.value)

- name: "Check if already installed - {{ app.key }}"
  ansible.builtin.stat:
    path: "{{ app.value.install_dir }}"
  register: binary_app_installed

- name: "Install binary application - {{ app.key }}"
  when: not binary_app_installed.stat.exists
  # Allow installation to fail in containers (GUI dependencies, network issues, etc.)
  ignore_errors: true
  block:
    - name: "Download tarball - {{ app.key }}"
      ansible.builtin.get_url:
        url: "{{ app.value.url }}"
        dest: "/tmp/{{ app.key }}.tar.gz"
        mode: "0644"
      retries: 3
      delay: 5
      until: binary_tarball is succeeded
      register: binary_tarball

    - name: "Create installation directory - {{ app.key }}"
      ansible.builtin.file:
        path: "{{ app.value.install_dir }}"
        state: directory
        mode: "0755"
      become: true

    - name: "Extract tarball - {{ app.key }}"
      ansible.builtin.unarchive:
        src: "/tmp/{{ app.key }}.tar.gz"
        dest: "{{ app.value.install_dir }}"
        remote_src: true
        extra_opts: [--strip-components=1]
      become: true
      when: not ansible_check_mode

    - name: "Create symlink - {{ app.key }}"
      ansible.builtin.file:
        src: "{{ app.value.install_dir }}/{{ app.value.binary_path }}"
        dest: "/usr/local/bin/{{ app.value.binary_name }}"
        state: link
      become: true
      when: not ansible_check_mode

- name: "Clean up temporary download - {{ app.key }}"
  ansible.builtin.file:
    path: "/tmp/{{ app.key }}.tar.gz"
    state: absent
  failed_when: false
