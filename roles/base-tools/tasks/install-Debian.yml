---
# Debian/Ubuntu installation tasks for base-tools

- name: Install dependencies via apt
  ansible.builtin.apt:
    name:
      - zip
      - unzip
    state: present
    update_cache: true
  become: true
  tags: base-tools, apt

- name: Install base packages via apt
  ansible.builtin.apt:
    name: "{{ debian_apt_packages }}"
    state: present
    update_cache: true
  become: true
  tags: base-tools, apt

# Install Debian applications (supports apt_repository, deb, and binary install methods)
- name: Install Debian applications
  ansible.builtin.include_tasks:
    file: install-debian-app.yml
    apply:
      tags: [base-tools, desktop-apps]
  loop: "{{ (debian_applications | default({})) | dict2items }}"
  loop_control:
    loop_var: app
  when:
    - debian_applications is defined
    - app.value.enabled | default(true) | bool
  tags: [base-tools, desktop-apps]

- name: Install Python CLI tools via uv
  tags: base-tools, additional
  block:
    - name: Check uv tool listing
      ansible.builtin.shell: |
        eval "$(mise activate bash)"
        uv tool list
      register: uv_cli_missing
      changed_when: false
      args:
        executable: /bin/bash

    - name: Install missing Python CLI tools using uv (idempotent)
      ansible.builtin.shell: |
        eval "$(mise activate bash)"
        uv tool install {{ item }}
      args:
        executable: /bin/bash
      register: install_python_cli_tools
      when: uv_cli_missing | length > 0
      changed_when: not "is already installed" in install_python_cli_tools.stderr
      loop:
        - tldr
        - glances
      become: false

    - name: Update uv shell configuration
      ansible.builtin.shell: |
        eval "$(mise activate bash)"
        uv tool update-shell
      register: uv_shell_update
      become: false
      args:
        executable: /bin/bash
      changed_when: "'Updated' in uv_shell_update.stdout or 'Updated' in uv_shell_update.stderr"
      failed_when:
        - uv_shell_update.rc != 0
        - "'already' not in uv_shell_update.stdout"
        - "'already' not in uv_shell_update.stderr"
        - "'shell could not be determined' not in uv_shell_update.stderr"
      when:
        - uv_update_shell | bool
