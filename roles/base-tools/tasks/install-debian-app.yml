---
# Dispatcher for a single Debian application installation (called in a loop via include_tasks)
# Expected variable: app (a dict2items element with app.key and app.value)

- name: "Install via apt_repository - {{ app.key }}"
  ansible.builtin.include_tasks:
    file: install-debian-apt-repo.yml
    apply:
      tags: [base-tools, desktop-apps]
  when: app.value.install_method == 'apt_repository'
  tags: [base-tools, desktop-apps]

- name: "Install via deb download - {{ app.key }}"
  ansible.builtin.include_tasks:
    file: install-debian-deb.yml
    apply:
      tags: [base-tools, desktop-apps]
  when: app.value.install_method == 'deb'
  tags: [base-tools, desktop-apps]

- name: "Install via binary tarball - {{ app.key }}"
  ansible.builtin.include_tasks:
    file: install-debian-binary.yml
    apply:
      tags: [base-tools, desktop-apps]
  when: app.value.install_method == 'binary'
  tags: [base-tools, desktop-apps]
