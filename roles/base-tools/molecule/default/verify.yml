---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check if git is installed
      ansible.builtin.command: which git
      register: git_installed
      changed_when: false
      failed_when: git_installed.rc != 0

    - name: Check if python3 is installed
      ansible.builtin.command: which python3
      register: python_installed
      changed_when: false
      failed_when: python_installed.rc != 0

    - name: Check if curl is installed
      ansible.builtin.command: which curl
      register: curl_installed
      changed_when: false
      failed_when: curl_installed.rc != 0

    - name: Check if jq is installed
      ansible.builtin.command: which jq
      register: jq_installed
      changed_when: false
      failed_when: jq_installed.rc != 0

    - name: Check if ripgrep is installed
      ansible.builtin.command: which rg
      register: ripgrep_installed
      changed_when: false
      failed_when: ripgrep_installed.rc != 0

    - name: Check if htop is installed
      ansible.builtin.command: which htop
      register: htop_installed
      changed_when: false
      failed_when: htop_installed.rc != 0

    - name: Check if shellcheck is installed
      ansible.builtin.command: which shellcheck
      register: shellcheck_installed
      changed_when: false
      failed_when: shellcheck_installed.rc != 0

    - name: Check if s5cmd is installed via mise (aqua type)
      ansible.builtin.command: mise which s5cmd
      register: s5cmd_installed
      changed_when: false
      failed_when: s5cmd_installed.rc != 0

    - name: Check if gopass is installed via mise (github type)
      ansible.builtin.command: mise which gopass
      register: gopass_installed
      changed_when: false
      failed_when: gopass_installed.rc != 0

    - name: Check if snap is installed
      ansible.builtin.command: which snap
      register: snap_installed
      changed_when: false
      failed_when: snap_installed.rc != 0
      when: ansible_facts.distribution == "Ubuntu"

    # --- apt_repository install method ---
    - name: Check GPG key was created (apt_repository method)
      ansible.builtin.stat:
        path: /etc/apt/keyrings/google_chrome.gpg
      register: apt_repo_key
      failed_when: not apt_repo_key.stat.exists

    - name: Check APT sources file was created (apt_repository method)
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/google_chrome.list
      register: apt_repo_sources
      failed_when: not apt_repo_sources.stat.exists

    # --- deb install method ---
    - name: Check bat is installed (deb method)
      ansible.builtin.command: which bat
      register: bat_installed
      changed_when: false
      failed_when: bat_installed.rc != 0

    # --- binary install method ---
    - name: Check delta install directory exists (binary method)
      ansible.builtin.stat:
        path: /opt/delta
      register: delta_dir
      failed_when: not delta_dir.stat.exists

    - name: Check delta symlink exists (binary method)
      ansible.builtin.stat:
        path: /usr/local/bin/delta
      register: delta_symlink
      failed_when: not delta_symlink.stat.exists
