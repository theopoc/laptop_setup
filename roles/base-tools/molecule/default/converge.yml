---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  vars:
    ansible_user: root
    github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('') }}"
    debian_apt_packages:
      - git
      - python3
      - python3-pip
      - curl
      - wget
      - unzip
      - jq
      - ripgrep
      - htop
      - shellcheck
    ubuntu_apt_packages:
      - git
      - python3
      - python3-pip
      - curl
      - wget
      - unzip
      - jq
      - ripgrep
      - htop
      - shellcheck
      - snapd
    mise_tools:
      uv: latest
      yq: latest
      lsd: latest
      dive: latest
      "aqua:peak/s5cmd": latest
      "github:gopasspw/gopass": latest
      "github:fishi0x01/vsh": latest
      "github:falcosuessgott/vkv": latest
      "aqua:leg100/pug": latest
      "github:busser/tfautomv": latest
      "aqua:suzuki-shunsuke/tfmv": latest
  tasks:
    - name: Include base-tools role
      ansible.builtin.include_role:
        name: base-tools
