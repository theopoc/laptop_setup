---
name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  ANSIBLE_FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v26.3.0
        with:
          requirements_file: requirements.yml

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint

      - name: Validate Ansible syntax
        uses: dawidd6/action-ansible-playbook@v7
        with:
          playbook: main.yml
          directory: ./
          requirements: requirements.yml
          options: |
            -i hosts
            --syntax-check

  discover-roles:
    name: Discover Roles and Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      changed_roles: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Discover testable roles and generate filters
        id: get-roles
        run: |
          testable_roles=()
          filters=""

          for role in roles/*/; do
            role_name=$(basename "$role")
            if [ -d "roles/${role_name}/molecule" ]; then
              testable_roles+=("$role_name")
              filters="${filters}${role_name}:\n  - 'roles/${role_name}/**'\n"
            else
              echo "Skipping $role_name (no molecule tests)"
            fi
          done

          roles=$(printf '%s\n' "${testable_roles[@]}" | jq -R -s -c 'split("\n")[:-1]')
          echo "Found testable roles: $roles"

          echo "filters<<EOF" >> $GITHUB_OUTPUT
          echo -e "$filters" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect changed roles
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: ${{ steps.get-roles.outputs.filters }}

  test-roles:
    name: Test Role - ${{ matrix.role }}
    runs-on: ubuntu-24.04
    needs: [lint, discover-roles]
    if: needs.discover-roles.outputs.changed_roles != '[]'
    strategy:
      fail-fast: true
      matrix:
        role: ${{ fromJSON(needs.discover-roles.outputs.changed_roles) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run Molecule tests (Ubuntu 24.04 + Debian 12)
        run: uv run molecule --debug test
        working-directory: roles/${{ matrix.role }}
        env:
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_ROLES_PATH: ../../../
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, discover-roles, test-roles]
    if: always()
    steps:
      - name: Check workflow status
        id: check
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.discover-roles.result }}" = "failure" ] || \
             [ "${{ needs.test-roles.result }}" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "status_emoji=❌" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "status_emoji=✅" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ${{ steps.check.outputs.status_emoji }} <b>PR Checks ${{ steps.check.outputs.status }}</b>

            <b>Repository:</b> <code>${{ github.repository }}</code>
            <b>PR:</b> <a href="${{ github.event.pull_request.html_url }}">#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}</a>
            <b>Branch:</b> <code>${{ github.head_ref }}</code>
            <b>Author:</b> ${{ github.actor }}

            <b>Job Results:</b>
            • Lint: ${{ needs.lint.result == 'success' && '✅' || '❌' }}
            • Discover Roles: ${{ needs.discover-roles.result == 'success' && '✅' || '❌' }}
            • Test Roles: ${{ needs.test-roles.result == 'success' && '✅' || needs.test-roles.result == 'skipped' && '⏭️' || '❌' }}

            <b>Tested Roles:</b> ${{ needs.discover-roles.outputs.changed_roles != '[]' && needs.discover-roles.outputs.changed_roles || 'None (no changes detected)' }}

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Workflow Run</a>
